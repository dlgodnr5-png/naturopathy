name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint --if-present

      - name: Build Next.js App
        run: npm run build
        env:
          # Add mock environment variables for build
          DATABASE_URL: "file:./dev.db"
          NEXTAUTH_SECRET: "mock_secret_for_ci"
          NEXTAUTH_URL: "http://localhost:3000"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Vercel (Placeholder)
        # In a real scenario, you can use Vercel CLI or rely on Vercel's native GitHub integration.
        # uses: amondnet/vercel-action@v20
        # with:
        #   vercel-token: ${{ secrets.VERCEL_TOKEN }}
        #   vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        #   vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        run: echo "Deployment to Vercel initiated."
